defaults:
  poll_interval: 30s
  max_concurrent_global: 1

agent_packs_dir: ../agents

user:
  name: "Your Name"
  gitlab_username: "your-gitlab-username"

sources:
  - name: gitlab-poc
    tracker: gitlab
    connection:
      base_url: https://gitlab.com
      token_env: $MAESTRO_GITLAB_TOKEN
      project: your-group/your-project
    filter:
      labels: [agent:ready]
      assignee: $MAESTRO_USER
    agent_type: repo-maintainer
    poll_interval: 30s

agent_types:
  - name: repo-maintainer
    agent_pack: repo-maintainer
    instance_name: claude-reviewer
    approval_policy: manual
    communication: slack-dm

channels:
  - name: slack-dm
    kind: slack
    config:
      mode: dm
      token_env: $MAESTRO_SLACK_BOT_TOKEN
      app_token_env: $MAESTRO_SLACK_APP_TOKEN
      user_id_env: $MAESTRO_SLACK_USER_ID

workspace:
  root: ~/.local/share/maestro/workspaces

state:
  dir: ~/.local/state/maestro
  retry_base: 10s
  max_retry_backoff: 5m
  max_attempts: 3

logging:
  level: info
  dir: ~/.local/state/maestro/logs

controls:
  before_work:
    enabled: true
    prompt: "Review the claimed issue before the agent starts. Reply with start, or add operator guidance for the run."
